<div class="settingsd" id="settings">
    <app-nav-bar></app-nav-bar>
    <app-back-to-home></app-back-to-home>
    <h1>Settings</h1>
    <div class="buttonPanel">
        <div class="btns">
            <button (click)="saveSettings()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                    <path
                        d="M64 32C28.7 32 0 60.7 0 96V416c0 35.3 28.7 64 64 64H384c35.3 0 64-28.7 64-64V173.3c0-17-6.7-33.3-18.7-45.3L352 50.7C340 38.7 323.7 32 306.7 32H64zm0 96c0-17.7 14.3-32 32-32H288c17.7 0 32 14.3 32 32v64c0 17.7-14.3 32-32 32H96c-17.7 0-32-14.3-32-32V128zM224 288a64 64 0 1 1 0 128 64 64 0 1 1 0-128z" />
                </svg>
                <div class="toolTip">
                    <div class="corner"></div>
                    <div class="text">Save Settings</div>
                </div>
            </button>
        </div>
        <h2>Settings Panel</h2>
    </div>
    <div class="panel">
        <div class="card">

            <div class="field">
                <div class="left">
                    <h2>Appearance mode</h2>
                </div>
                <div class="right">
                    <select [(ngModel)]="settings.theme">
                        <option value="D">Dark Mode</option>
                        <option value="L">Light Mode</option>
                    </select>
                </div>
            </div>
            <div class="field">
                <div class="left">
                    <h2>Dashboard Reload Interval (in ms)</h2>
                </div>
                <div class="right">
                    <input type="number" class="inpNum" [(ngModel)]="settings.dashboardReloadTimeout">
                </div>
            </div>
            <div class="field">
                <div class="left">
                    <h2>Traffic Reload Interval (in ms)</h2>
                </div>
                <div class="right">
                    <input type="number" class="inpNum" [(ngModel)]="settings.trafficReloadInterval">
                </div>
            </div>

        </div>
    </div>
</div>
