<nav>
    <div class="left">
        <img src="assets/logo1.png" alt="">
        <h1>link Server</h1>
    </div>
    <div class="mid">
        <p>Lightning fast⚡ & Ready to GO 🏍️</p>
    </div>
    <div class="right">
        <button (click)="runInBackground()">Run in background</button>
        <button (click)="openDeveloperUrl()">Developer</button>
        <div class="winBtn" (click)="minimizeWindow()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                <path
                    d="M432 256c0 17.7-14.3 32-32 32L48 288c-17.7 0-32-14.3-32-32s14.3-32 32-32l352 0c17.7 0 32 14.3 32 32z" />
            </svg>
        </div>
        <div class="winBtn" (click)="toggleMinMaxWin()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                <path
                    d="M384 80c8.8 0 16 7.2 16 16V416c0 8.8-7.2 16-16 16H64c-8.8 0-16-7.2-16-16V96c0-8.8 7.2-16 16-16H384zM64 32C28.7 32 0 60.7 0 96V416c0 35.3 28.7 64 64 64H384c35.3 0 64-28.7 64-64V96c0-35.3-28.7-64-64-64H64z" />

        </div>
        <div class="winBtn" (click)="showCloseQuestion=true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512">
                <path
                    d="M342.6 150.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192 210.7 86.6 105.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L146.7 256 41.4 361.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192 301.3 297.4 406.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.3 256 342.6 150.6z" />
            </svg>
        </div>
    </div>
</nav>
<div class="navSpace"></div>
<div class="closeAskQuestion" [@enterAnimation] *ngIf="showCloseQuestion">
    <div class="card">
        <h1>All servers will stop automaticaly on close !</h1>
        <div>
            <button (click)="showCloseQuestion=false">Cancel</button>
            <button (click)="closeWindow()">Close anyway</button>
        </div>
    </div>
</div>
